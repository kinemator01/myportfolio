<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vula Access — Bursary Discovery Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="vula-access.css">
</head>
<body>
    <div class="carousel-container">
        <!-- Header -->
        <div class="carousel-header">
            <div class="wordmark">
                Vula <span class="accent">Access</span>
            </div>
            <div class="slide-counter">
                <span class="current-slide">01</span> / <span class="total-slides">16</span>
            </div>
        </div>

        <!-- Main carousel -->
        <div class="carousel-main">
            <!-- Image panel -->
            <div class="carousel-image-panel">
                <img class="carousel-image" src="images/Vula%20Access/slide-01.jpg" alt="Vula Access slide">
            </div>

            <!-- Content panel -->
            <div class="carousel-content-panel">
                <div class="carousel-content">
                    <div class="eyebrow"></div>
                    <h1 class="slide-title"></h1>
                    <p class="slide-description"></p>
                </div>

                <!-- Navigation controls -->
                <div class="carousel-controls">
                    <div class="dot-navigation"></div>
                    <div class="arrow-buttons">
                        <button class="arrow-btn prev-btn" aria-label="Previous slide">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <button class="arrow-btn next-btn" aria-label="Next slide">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Back link -->
        <a href="banelephali.html#projects" class="back-link">← Back to portfolio</a>
    </div>

    <script src="vula-access.js"></script>
</body>
</html>
